name: Build and Push to Aliyun ACR

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  DOCKER_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_NAMESPACE: skillup
  IMAGE_NAME: dind

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          auth: ${{ secrets.ALIYUN_REGISTRY_AUTH }}

      - name: Build and Push base image
        run: |
          docker build --secret id=my_secret_var,src=arg.txt -t ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest

      - name: Build and Push language variants
        run: |
          for lang in rust python node golang java; do
            echo "Building dind:${lang}..."
            docker build \
              --secret id=my_secret_var,src=arg.txt \
              --build-arg LANG_TYPE=${lang} \
              -f Dockerfile.multi \
              -t ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}:${lang} .
            docker push ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}:${lang}
          done

      - name: List pushed images
        run: |
          echo "=== Pushed images ==="
          for lang in rust python node golang java latest; do
            echo "${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}:${lang}"
          done
